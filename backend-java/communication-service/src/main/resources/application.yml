server:
  port: 8084

spring:
  datasource:
    url: jdbc:oracle:thin:@localhost:1521:XE
    username: HANDYSERVE
    password: handyserve123
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.community.dialect.OracleLegacyDialect
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.OracleLegacyDialect
        default_schema: HANDYSERVE
  data:
    mongodb:
      uri: mongodb://localhost:27017/handyserve
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

jwt:
  secret: handyserve_super_secret_key_for_jwt_minimum_256_bits_change_in_prod
  expiration-ms: 900000
  refresh-expiration-ms: 604800000

app:
  auth-service-url: http://localhost:8082
  client-origin: ${APP_CLIENT_ORIGIN:http://10.1.0.223:5173}
  nominatim-base: https://nominatim.openstreetmap.org

management:
  endpoints:
    web:
      exposure:
        include: health,info
