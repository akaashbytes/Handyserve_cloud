server:
  port: 8081

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      # Global CORS configuration
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "http://localhost:5174"
              - "http://10.1.0.209:5173"
              - "http://10.1.0.209:5174"
              - "http://10.1.0.223:5173"
              - "http://10.1.0.223:5174"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

      routes:
        # ── Auth Service (port 8082) ──────────────────────────────────────────
        - id: auth-login-register
          uri: http://localhost:8082
          predicates:
            - Path=/api/auth/**
          filters:
            - RewritePath=/api/auth/(?<segment>.*), /api/auth/$\{segment}

        - id: customer-auth
          uri: http://localhost:8082
          predicates:
            - Path=/api/customer/auth/**
          filters:
            - RewritePath=/api/customer/auth/(?<segment>.*), /api/customer/auth/$\{segment}

        - id: customer-profile
          uri: http://localhost:8082
          predicates:
            - Path=/api/customer/profile/**

        # ── Communication Service (port 8084) ─────────────────────────────────
        - id: disputes
          uri: http://localhost:8084
          predicates:
            - Path=/api/disputes/**

        - id: payments
          uri: http://localhost:8084
          predicates:
            - Path=/api/payments/**

        - id: customer-payments
          uri: http://localhost:8084
          predicates:
            - Path=/api/customer/payments/**

        - id: notifications
          uri: http://localhost:8084
          predicates:
            - Path=/api/notifications/**

        - id: contact
          uri: http://localhost:8084
          predicates:
            - Path=/api/contact/**

        - id: booking-chat
          uri: http://localhost:8084
          predicates:
            - Path=/api/bookings/*/chat/**

        - id: websocket
          uri: ws://localhost:8084
          predicates:
            - Path=/ws/**

        # ── Booking Service (port 8083) ───────────────────────────────────────
        - id: bookings
          uri: http://localhost:8083
          predicates:
            - Path=/api/bookings/**

        - id: customer-bookings
          uri: http://localhost:8083
          predicates:
            - Path=/api/customer/bookings/**

        - id: customer-dashboard
          uri: http://localhost:8083
          predicates:
            - Path=/api/customer/dashboard/**

        - id: customer-tracking
          uri: http://localhost:8083
          predicates:
            - Path=/api/customer/tracking/**

        - id: customer-discover
          uri: http://localhost:8083
          predicates:
            - Path=/api/customer/discover/**

        - id: providers
          uri: http://localhost:8083
          predicates:
            - Path=/api/providers/**

        - id: leave
          uri: http://localhost:8083
          predicates:
            - Path=/api/leave/**

        - id: analytics
          uri: http://localhost:8083
          predicates:
            - Path=/api/analytics/**

        - id: nominatim
          uri: http://localhost:8083
          predicates:
            - Path=/api/nominatim/**

# ── Actuator ─────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      enabled: true

logging:
  level:
    org.springframework.cloud.gateway: INFO
    reactor.netty: WARN
